name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python
        run: python -m py_compile fetch_data.py graph_utils.py make_mock.py hardcoded_data.py tests/test_fetch_data.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check frontend syntax
        run: node --check script.js
